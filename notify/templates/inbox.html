{{if .Items}}
<div class="list-group mb-3">
  {{range .Items}}
  <div class="list-group-item {{if not .Read}}list-group-item-primary{{end}}">
    <div class="d-flex justify-content-between align-items-start">
      <strong>{{if not .Read}}&bull; {{end}}{{.Title}}</strong>
      <span class="small text-muted ms-2">{{.CreatedAt.Format "2006-01-02 15:04"}}</span>
    </div>
    {{if .Body}}<div class="small text-muted">{{.Body}}</div>{{end}}
    {{if .Link}}<a class="small" href="{{.Link}}">View</a>{{end}}
  </div>
  {{end}}
</div>
<form method="post" action="/p/inbox/read-all">
  <button class="btn btn-sm btn-outline-secondary" type="submit">Mark all read</button>
</form>
{{else}}
<div class="empty">No notifications yet.</div>
{{end}}
